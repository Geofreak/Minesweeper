<!doctype html>
<html>

<head>
  <title>💥 MineSweeper</title>
  <meta http-equiv="content-type" content="text/html;charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css">
  <!-- Bootstrap core CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
  <!-- Material Design Bootstrap -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdbootstrap/4.8.7/css/mdb.min.css" rel="stylesheet">
  <!--Intro JS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/intro.js/2.9.3/introjs.css" rel="stylesheet">
  <!--Element specific styles -->
  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body class="grey lighten-5">
  <header>
    <nav class="mb-1 navbar navbar-expand-lg navbar-dark info-color">
      <a class="navbar-brand" href="#">MineSweeper</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent-4" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item active">
            <a class="nav-link" href="https://github.com/mayankrajendrat/minesweeper">
              <i class="fab fa-github"></i> github
              <span class="sr-only">(current)</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://github.com/mayankrajendrat/minesweeper/blob/master/README.md">
              <i class="fas fa-info-circle"></i> Info
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <div class="container-fluid mt-2">
      <section>
        <div class="row justify-content-md-center">
          <div class="col-lg-6 col-md-8 mb-4">
            <div class="card panels-card wrapper">

              <div class="rounded-top grey lighten-2 dark-grey-text row ml-0 mr-0">
                <div class="col-12">
                  <ul class="list-inline float-center my-0 py-1 pr-3">
                    <li class="list-inline-item">
                      <button type="button" class="action-btn js-new-game btn btn-default btn-lg btn-block"
                        aria-label="New game" data-intro='Spiel zurücksetzen!' data-step="1">
                        <span class="default-emoji"></span>
                        <span id="result" class="result-emoji"></span>
                      </button>
                    </li>
                  </ul>
                </div>
              </div>

              <!--Navbar-->
              <nav class="navbar navbar-expand-lg navbar-dark grey lighten-5 d-flex justify-content-between z-depth-1-bottom">
                <div>
                  <ul class="list-inline my-2 py-1 dark-grey-text" data-intro='Spieltimer' data-step="2">
                    <li class="list-inline-item"><i class="fas fa-clock"></i></li>
                    <li class="list-inline-item font-weight-bold text-uppercase">
                      <div id="timer"></div>
                    </li>
                  </ul>
                </div>

                <div>
                  <ul class="list-inline my-2 py-1 dark-grey-text">
                    <li class="list-inline-item" data-intro='Anzahl verbleibender Bomben' data-step="3">
                      <i class="fas fa-bomb" aria-hidden="true"></i>
                      <span id="bombs-left">0</span>
                    </li>
                    <li class="list-inline-item" data-intro='Anzahl der Züge' data-step="4">
                      <i class="fas fa-arrows-alt" aria-hidden="true"></i>
                      <span id="moves"></span><span> Zug/Züge</span>
                    </li>
                    <li class="list-inline-item">
                      <!-- Spielfeld ist fest: 20x20, 75 Minen – kein Einstellungsdialog nötig -->
                      <span class="settings js-settings" aria-label="Einstellungen (fest: 20×20, 75 Minen)"
                        title="Spielfeld: 20×20 | Minen: 75">⚙️</span>
                    </li>
                  </ul>
                </div>
              </nav>
              <!--/.Navbar-->

              <!-- Fixe Spielfeldinfo -->
              <div class="text-center py-1 small text-muted">
                Spielfeld: <strong>20 × 20</strong> &nbsp;|&nbsp; Minen: <strong>75</strong>
              </div>

              <div class="card-body grey lighten-5 rounded-bottom">
                <div class="row">
                  <div class="col-12 p-1">
                    <div id="map" role="grid" aria-label="Minenfeld" data-intro='Das Minenfeld' data-step="5"></div>
                  </div>
                </div>
              </div>

              <div class="card-footer text-muted text-center mt-4"
                data-intro='Hinweise zu deinen Zügen.' data-step="6">
                <div aria-live="assertive">
                  <i class="fas fa-info-circle"></i> <span class="feedback"></span>
                </div>
              </div>

            </div><!-- /.card -->
          </div><!-- /.col -->
        </div><!-- /.row -->
      </section>
    </div>
  </main>

  <!-- JQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <!-- Bootstrap tooltips -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.4/umd/popper.min.js"></script>
  <!-- Bootstrap core JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <!-- MDB core JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mdbootstrap/4.8.7/js/mdb.min.js"></script>
  <!-- Intro.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intro.js/2.9.3/intro.min.js"></script>

  <!-- Spiellogik (kein twemoji mehr nötig) -->
  <script src="assets/js/game.js"></script>

  <script>
    // Feste Spielfeldgröße: 20x20, 75 Minen
    var COLS  = 20;
    var ROWS  = 20;
    var BOMBS = 75;

    var game = new mineSweeper(COLS, ROWS, BOMBS);

    document.querySelector('.js-new-game').addEventListener('click', restart);

    introJs().start();

    function restart() {
      clearInterval(game.timer);
      game = new mineSweeper(COLS, ROWS, BOMBS);
      game.updateFeedback('Spiel neu gestartet');
      return false;
    }
  </script>
</body>

</html>
